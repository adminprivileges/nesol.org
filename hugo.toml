baseURL = "https://www.nesol.org/"
title = "NE Solutions"
author = "username"
languageCode = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
theme = "tella"
enableRobotsTXT = true

# Please enable this feature if the site is available in Japanese, Chinese or Korean.
#hasCJKLanguage = true

[services]
  [services.googleAnalytics]
  # If you're using Google Analytics, you can enable this feature.
  #id = "G-1234567890"

  [services.disqus]
  # Disqus Comment System
  #shortname = "your-disqus-shortname"

[params]
showBlog = true
mainSections = ['careers']
googleFonts = true

  [params.logo]
  main = "img/logo/nesol_transparent.png"
  alt = "Ne Solutions Logo"

  # The size parameter is the class name of tailwindcss
  # https://tailwindcss.com/
  size = "h-14"

  [params.site]
  name = "NE Solutions"

  [params.icon]
  # If you want to use FontAwesome, set this parameter to true.
  #fontawesome = true

  # You can also use Bootstrap Icons.
  bootstrap = true

  [params.share]
  # If you want to use share buttons, set this parameter to true.
  enable = true
  # Uncomment and edit to limit which services are shown
  # services = ["twitter", "mastodon", "facebook", "line", "linkedin", "whatsapp", "mail", "copy"]

  [params.homepage_meta_tags]
  meta_description = "NE Solutions a Leader in Cyber Security Training"
  meta_og_title = "NE Solutions"
  meta_og_type = "website"
  meta_og_url = "https://nesol.org"
  meta_og_image = "https://raw.githubusercontent.com/adminprivileges/nesol.org/master/images/nesol_transparent_logo.png"
  meta_og_description = "NE Solutions a Leader in Cybersecurity Training"
  #meta_twitter_card = "summary_large_image"
  #meta_twitter_site = "@username"
  #meta_twitter_creator = "@username"

  [params.giscus]
  # Giscus Comment System
  # See https://giscus.app for setup instructions
  #repo = "your-repo"
  #repo_id = "your-repo-id"
  #category = "Announcements"
  #category_id = "your-category-id"
  #mapping = "pathname"
  #strict = "0"
  #reactions_enabled = "1"
  #emit_metadata = "0"
  #input_position = "bottom"
  #theme = "preferred_color_scheme"
  #lang = "en"
  #loading = "lazy"

[menu]

  [[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 1

  [[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 2

  [[menu.main]]
  identifier = "skillbridge"
  name = "Skillbridge"
  url = "/skillbridge/"
  weight = 3

  [[menu.main]]
  identifier = "careers"
  name = "Careers"
  url = "/careers/"
  weight = 4

  [[menu.main]]
  identifier = "contact"
  name = "Contact"
  url = "/contact/"
  weight = 5

  # Footer Menu
  [[menu.footer]]
  name = "Home"
  url = "/"
  weight = 1

  [[menu.footer]]
  name = "Github"
  url = "https://github.com/adminprivileges/nesol.org"
  #pre = "<i class='bi bi-github text-2xl'></i>"
  weight = 2

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[privacy]
  [privacy.vimeo]
  disabled = false
  simple = false

  [privacy.x]
  disabled = false
  enableDNT = true
  simple = false

  [privacy.instagram]
  disabled = false
  simple = false

  [privacy.youtube]
  disabled = false
  privacyEnhanced = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = true

[build]
  [build.buildStats]
  enable = true
  [[build.cachebusters]]
  source = 'assets/notwatching/hugo_stats\.json'
  target = 'css'

[module]
  [[module.mounts]]
  source = 'assets'
  target = 'assets'
  [[module.mounts]]
  disableWatch = true
  source = 'hugo_stats.json'
  target = 'assets/notwatching/hugo_stats.json'

[caches]
  [caches.images]
    dir = ':cacheDir/images'
