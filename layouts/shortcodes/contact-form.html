<form
  action="https://formspree.io/f/xbdbarzl"
  method="POST"
  class="max-w-2xl mt-8 space-y-6"
>
  <div>
    <label for="name" class="block text-sm font-semibold text-gray-700">
      Name
    </label>
    <input
      type="text"
      id="name"
      name="name"
      required
      class="mt-2 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-green-600 focus:ring-green-600"
    >
  </div>

  <div>
    <label for="email" class="block text-sm font-semibold text-gray-700">
      Email
    </label>
    <input
      type="email"
      id="email"
      name="email"
      required
      class="mt-2 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-green-600 focus:ring-green-600"
    >
  </div>

  <div>
    <label for="subject" class="block text-sm font-semibold text-gray-700">
      Subject
    </label>
    <input
      type="text"
      id="subject"
      name="subject"
      class="mt-2 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-green-600 focus:ring-green-600"
    >
  </div>

  <div>
    <label for="message" class="block text-sm font-semibold text-gray-700">
      Message
    </label>
    <textarea
      id="message"
      name="message"
      rows="6"
      required
      class="mt-2 block w-full rounded-md border border-gray-300 px-4 py-3 shadow-sm focus:border-green-600 focus:ring-green-600"
    ></textarea>
  </div>

  <input type="hidden" name="_subject" value="New message from the NE Solutions website">

  <button
    type="submit"
    class="rounded-md px-6 py-3 font-semibold text-white shadow-sm"
    style="background-color: #00ba2b;"
  >
    Send Message
  </button>
</form>
